@if (!isHome) {
<div class="h-16 w-full flex-none"></div>
}

<header [ngClass]="{
    'h-24 bg-transparent! shadow-none border-b-0': !hasScrolled && isHome,
    'h-16 bg-white/90! backdrop-blur-md shadow-sm border-b border-slate-200': hasScrolled || !isHome
  }" class="fixed top-0 w-full z-50 transition-all duration-300 ease-in-out flex items-center">
  <div class="container mx-auto px-6 md:px-12 xl:px-24 h-full flex items-center justify-between">

    <div class="shrink-0 transition-transform duration-300 cursor-pointer origin-left"
      [ngClass]="(hasScrolled || !isHome) ? 'scale-90' : 'scale-100'" routerLink="/">
      <img class="h-16 w-auto object-contain" src="assets/images/grade-horarios-logo.png" alt="Logo" />
    </div>

    <nav class="hidden lg:flex items-center gap-8">
      <ul class="flex items-center gap-8">
        @for (route of mockDefaultRoutes; track route.title) {
        <li>
          <a [routerLink]="route.href" (click)="scrollToId(route.scrollTo)"
            [ngClass]="(hasScrolled || !isHome) ? 'text-slate-600' : 'text-slate-800'"
            class="text-sm font-bold hover:text-primary-600 transition-colors cursor-pointer uppercase tracking-wider">
            {{ route.title }}
          </a>
        </li>
        }
      </ul>

      <div class="flex items-center gap-4 border-l pl-8"
        [ngClass]="(hasScrolled || !isHome) ? 'border-slate-200' : 'border-slate-300/50'">

        <button matButton="elevated" color="primary">
          Entrar
        </button>
        <button matButton="elevated" color="primary">
          Cadastre-se
        </button>
      </div>
    </nav>

    <div class="lg:hidden">
      <button mat-icon-button [matMenuTriggerFor]="menu" class="text-slate-700!">
        <mat-icon class="scale-125">menu</mat-icon>
      </button>
    </div>

    <mat-menu #menu="matMenu" class="custom-menu-panel mt-2">
      @for (route of mockDefaultRoutes; track route.title) {
      <button mat-menu-item (click)="scrollToId(route.scrollTo)">
        <mat-icon class="text-primary-600!">chevron_right</mat-icon>
        <span class="font-bold text-slate-700">{{ route.title }}</span>
      </button>
      }
      <mat-divider class="my-2!"></mat-divider>
      <div class="p-4 flex flex-col gap-3">
        <button matButton="elevated" color="primary">
          Entrar
        </button>
        <button matButton="elevated" color="primary">
          Cadastre-se
        </button>
      </div>
    </mat-menu>
  </div>
</header>
