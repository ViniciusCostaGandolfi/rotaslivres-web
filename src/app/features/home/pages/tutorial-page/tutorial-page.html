<main class="tutorial-container bg-white">
  <section class="relative overflow-hidden pt-16 pb-20 lg:pt-24 lg:pb-32">
    <!-- Decorative background elements -->
    <div class="absolute top-0 right-0 -translate-y-1/2 translate-x-1/4 w-96 h-96 bg-red-50 rounded-full blur-3xl opacity-60"></div>
    <div class="absolute bottom-0 left-0 translate-y-1/2 -translate-x-1/4 w-96 h-96 bg-rose-50 rounded-full blur-3xl opacity-60"></div>

    <div class="container mx-auto px-6 relative z-10">
      <div class="text-center max-w-4xl mx-auto mb-16">
        <span class="inline-flex items-center py-1.5 px-4 rounded-full bg-red-100 text-red-700 text-xs font-bold uppercase tracking-widest mb-6">
          <mat-icon class="mr-2 text-sm!">play_circle_filled</mat-icon>
          Aprenda a usar
        </span>
        <h1 class="text-5xl lg:text-7xl font-black text-slate-900 leading-[1.1] mb-8">
          Tutorial <span class="text-red-600">Completo</span>
        </h1>
        <p class="text-xl text-slate-600 mb-10 leading-relaxed">
          Assista ao vídeo abaixo para aprender como otimizar suas rotas e maximizar o impacto social da sua organização.
        </p>
      </div>

      <div class="video-wrapper max-w-5xl mx-auto">
        <div class="relative group">
          <div class="absolute -inset-1 bg-linear-to-r from-red-600 to-rose-500 rounded-3xl blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
          <div class="relative bg-white p-3 rounded-3xl shadow-2xl border border-red-50">
            <div class="aspect-video rounded-2xl overflow-hidden shadow-inner bg-slate-900">
              <iframe 
                [src]="videoUrl" 
                title="Tutorial Rotas Livres" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen
                class="w-full h-full"
              ></iframe>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-20 text-center">
        <div class="flex flex-col sm:flex-row gap-5 justify-center">
          <button routerLink="/sigin" mat-flat-button color="primary"
            class="py-8! px-10! text-lg! rounded-2xl! bg-red-600! hover:bg-red-700! transition-all! shadow-2xl! shadow-red-200!">
            Começar Agora
          </button>
          <button routerLink="/" mat-stroked-button
            class="py-8! px-10! text-lg! rounded-2xl! border-slate-300! text-slate-700!">
            Voltar para Home
          </button>
        </div>
      </div>
    </div>
  </section>
</main>
