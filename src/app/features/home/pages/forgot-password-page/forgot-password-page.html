<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
    <div class="text-center mb-4">
      <h2 class="h4 mb-3 fw-normal">Recuperar Senha</h2>
      <p class="text-muted">Informe seu e-mail para receber um link de recuperação.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #forgotForm="ngForm">
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" 
               [(ngModel)]="email" name="email" required email>
        <label for="floatingEmail">Email</label>
      </div>

      <div *ngIf="successMessage" class="alert alert-success mt-3" role="alert">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger mt-3" role="alert">
        {{ errorMessage }}
      </div>

      <div class="d-grid mt-4">
        <button class="btn btn-primary btn-lg" type="submit" [disabled]="!forgotForm.valid || isLoading">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Enviar Link
        </button>
      </div>
    </form>
    <div class="text-center mt-3">
        <a routerLink="/login" class="text-decoration-none">Voltar para o Login</a>
    </div>
  </div>
</div>
