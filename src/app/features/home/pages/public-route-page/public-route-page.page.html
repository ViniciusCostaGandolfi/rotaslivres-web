<div *ngIf="isLoading" class="flex justify-center flex-col items-center h-screen bg-gray-50">
    <mat-spinner diameter="50"></mat-spinner>
    <p class="mt-4 text-gray-500 font-medium tracking-wide">Carregando mapa da rota...</p>
</div>

<div *ngIf="hasError" class="flex flex-col justify-center items-center h-screen bg-gray-50 text-red-600 p-6">
    <h2 class="text-2xl font-bold mb-2">Ops! Link inválido ou expirado</h2>
    <p class="mb-6 max-w-md text-center text-gray-600">{{ errorMessage }}</p>
</div>

<div *ngIf="!isLoading && !hasError && vrpResult" class="h-screen w-full">
    <app-map-vrp [vrp]="vrpResult" [solutionMeta]="solutionMeta" class="block w-full h-full"></app-map-vrp>
</div>
