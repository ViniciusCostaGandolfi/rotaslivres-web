<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
    <div class="text-center mb-4">
      <h2 class="h4 mb-3 fw-normal">Criar Nova Senha</h2>
      <p class="text-muted">Informe sua nova senha abaixo.</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="floatingPassword" placeholder="Nova Senha" 
               formControlName="password">
        <label for="floatingPassword">Nova Senha</label>
        <div *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.hasError('required')" class="text-danger small mt-1">
          A senha é obrigatória.
        </div>
        <div *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.hasError('minlength')" class="text-danger small mt-1">
          A senha deve ter no mínimo 6 caracteres.
        </div>
      </div>

      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="floatingConfirmPassword" placeholder="Confirmar Senha" 
               formControlName="confirmPassword">
        <label for="floatingConfirmPassword">Confirmar Senha</label>
        <div *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.hasError('mismatch')" class="text-danger small mt-1">
          As senhas não coincidem.
        </div>
      </div>

      <div *ngIf="successMessage" class="alert alert-success mt-3" role="alert">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger mt-3" role="alert">
        {{ errorMessage }}
      </div>

      <div class="d-grid mt-4">
        <button class="btn btn-primary btn-lg" type="submit" [disabled]="!resetForm.valid || isLoading || !token">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Salvar Nova Senha
        </button>
      </div>
    </form>
    
    <div class="text-center mt-3">
      <a routerLink="/login" class="text-decoration-none">Voltar para o Login</a>
    </div>
  </div>
</div>
