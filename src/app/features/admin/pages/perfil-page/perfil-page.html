<section class="min-h-[calc(100vh-64px)] bg-gray-50 py-10 px-4 sm:px-8">

  <div class="max-w-2xl mx-auto">

    <!-- Profile Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

      <!-- Header with avatar -->
      <div class="bg-red-600 px-6 py-8 flex items-center gap-5">
        <div
          class="w-16 h-16 rounded-full bg-white/20 backdrop-blur flex items-center justify-center text-white text-2xl font-bold shadow-lg ring-2 ring-white/30">
          {{ userInitial }}
        </div>
        <div>
          <h1 class="text-xl font-bold text-white">{{ form.get('name')?.value }}</h1>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-xs font-medium bg-white/20 text-white px-2.5 py-0.5 rounded-full">
              {{ userRole }}
            </span>
          </div>
        </div>
      </div>

      <!-- Form -->
      <div class="p-6">
        <h2 class="text-lg font-bold text-gray-900 mb-1">Informações Pessoais</h2>
        <p class="text-sm text-gray-500 mb-6">Atualize seus dados de perfil abaixo.</p>

        <form [formGroup]="form" (ngSubmit)="onSave()">

          <mat-form-field appearance="fill" class="w-full">
            <mat-label>Nome</mat-label>
            <input matInput formControlName="name" placeholder="Seu nome completo">
            <mat-icon matPrefix class="mr-2 text-gray-400!">person</mat-icon>
            <mat-error *ngIf="form.controls['name'].hasError('required')">
              Nome é obrigatório
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="fill" class="w-full">
            <mat-label>E-mail</mat-label>
            <input matInput formControlName="email" placeholder="seu@email.com">
            <mat-icon matPrefix class="mr-2 text-gray-400!">email</mat-icon>
            <mat-hint>O e-mail não pode ser alterado</mat-hint>
          </mat-form-field>

          <mat-divider class="my-6!"></mat-divider>

          <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
            <app-spinner-button class="w-full! sm:w-auto!" [isLoading]="isLoading" [type]="'submit'">
              Salvar Alterações
            </app-spinner-button>

            <button mat-stroked-button type="button" (click)="logout()"
              class="w-full sm:w-auto text-red-600! border-red-300! hover:bg-red-50! rounded-xl! py-2! px-6!">
              <mat-icon class="mr-1">logout</mat-icon>
              Sair da Conta
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>

</section>
